kind = "web"
previewPath = "/"
title = "Fazenda São Bento — Sistema de Gestão"
version = "1.0.0"
id = "artifacts/fazenda-sao-bento"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20740
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fazenda-sao-bento run dev"

[services.env]
PORT = "20740"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fazenda-sao-bento", "run", "build"]
publicDir = "artifacts/fazenda-sao-bento/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
